document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

ground:#0b1410}\n  ::-webkit-scrollbar{width:10px;height:10px}\n  ::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.12);border-radius:6px}\n  ::-webkit-scrollbar-track{background:transparent}\n  @keyframes ts-spin{to{transform:rotate(360deg)}}\n  @keyframes ts-pulse{0%,100%{opacity:1}50%{opacity:0.45}}\n  @keyframes ts-rise{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}\n<\u002Fstyle>\n<\u002Fhelmet>\n<div style=\"width:100vw;height:100vh;display:flex;background:#0b1410;color:#eaf2ee;font-family:'Schibsted Grotesk',sans-serif;overflow:hidden\">\n\n  <aside style=\"width:252px;flex-shrink:0;background:#0e1712;border-right:1px solid rgba(255,255,255,0.06);display:flex;flex-direction:column;padding:24px 18px\">\n    <div style=\"display:flex;align-items:center;gap:11px;padding:4px 8px 28px\">\n      <div style=\"display:grid;grid-template-columns:repeat(2,9px);grid-template-rows:repeat(2,9px);gap:3px\"><div style=\"background:#2fd08a\"><\u002Fdiv><div style=\"border:1px solid #2c4a3c\"><\u002Fdiv><div style=\"border:1px solid #2c4a3c\"><\u002Fdiv><div style=\"background:#2fd08a\"><\u002Fdiv><\u002Fdiv>\n      <span style=\"font-size:19px;font-weight:600;letter-spacing:-0.01em\">Tessera<\u002Fspan>\n      <span style=\"font-family:'JetBrains Mono',monospace;font-size:10px;letter-spacing:0.12em;color:#6f8a7e;border:1px solid rgba(255,255,255,0.12);border-radius:4px;padding:2px 5px;margin-left:2px\">CONSOLE<\u002Fspan>\n    <\u002Fdiv>\n    <nav style=\"display:flex;flex-direction:column;gap:4px\">\n      <sc-for list=\"{{ nav }}\" as=\"n\" hint-placeholder-count=\"3\">\n        <button onclick=\"{{ n.onClick }}\" style=\"{{ n.rowStyle }}\">\n          <span style=\"{{ n.dotStyle }}\"><\u002Fspan>\n          <span style=\"{{ n.labelStyle }}\">{{ n.label }}<\u002Fspan>\n          <sc-if value=\"{{ n.done }}\" hint-placeholder-val=\"{{ false }}\"><span style=\"margin-left:auto;color:#2fd08a;font-size:13px;font-family:'JetBrains Mono',monospace\">✓<\u002Fspan><\u002Fsc-if>\n        <\u002Fbutton>\n      <\u002Fsc-for>\n    <\u002Fnav>\n    <div style=\"margin-top:auto;padding:14px;background:#122019;border:1px solid rgba(255,255,255,0.06);border-radius:10px\">\n      <div style=\"font-family:'JetBrains Mono',monospace;font-size:10px;letter-spacing:0.14em;color:#6f8a7e;margin-bottom:7px\">ENGINE<\u002Fdiv>\n      <div style=\"font-size:14px;color:#cdddd4;line-height:1.4\">{{ engineLabel }}<\u002Fdiv>\n      <div style=\"display:flex;align-items:center;gap:7px;margin-top:11px\"><span style=\"width:7px;height:7px;border-radius:50%;background:#2fd08a\"><\u002Fspan><span style=\"font-family:'JetBrains Mono',monospace;font-size:11px;color:#9fb3a9\">files stay in-browser<\u002Fspan><\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Faside>\n\n  <main style=\"flex:1;display:flex;flex-direction:column;min-width:0\">\n    <header style=\"height:62px;flex-shrink:0;border-bottom:1px solid rgba(255,255,255,0.06);display:flex;align-items:center;justify-content:space-between;padding:0 30px\">\n      <div style=\"display:flex;align-items:center;gap:12px;font-family:'JetBrains Mono',monospace;font-size:13px;color:#9fb3a9\"><span style=\"color:#6f8a7e\">tessera<\u002Fspan><span style=\"color:#3a4a42\">/<\u002Fspan><span style=\"color:#eaf2ee\">{{ crumb }}<\u002Fspan><\u002Fdiv>\n      <div style=\"display:flex;align-items:center;gap:18px\">\n        <div style=\"display:flex;align-items:center;gap:8px\"><span style=\"width:8px;height:8px;border-radius:50%;background:#2fd08a;box-shadow:0 0 0 4px rgba(47,208,138,0.15)\"><\u002Fspan><span style=\"font-family:'JetBrains Mono',monospace;font-size:12px;letter-spacing:0.08em;color:#9fb3a9\">LIVE<\u002Fspan><\u002Fdiv>\n        <button onclick=\"{{ onReset }}\" style=\"background:transparent;border:1px solid rgba(255,255,255,0.14);color:#9fb3a9;font-family:'JetBrains Mono',monospace;font-size:12px;letter-spacing:0.05em;padding:8px 14px;border-radius:7px;cursor:pointer\">RESET<\u002Fbutton>\n      <\u002Fdiv>\n    <\u002Fheader>\n\n    <div style=\"flex:1;overflow-y:auto;padding:34px 40px 60px\">\n\n      <!-- ===================== DATA LAKE ===================== -->\n      <sc-if value=\"{{ isLake }}\" hint-placeholder-val=\"{{ true }}\">\n        <div>\n          <div style=\"display:flex;align-items:flex-end;justify-content:space-between;gap:24px;margin-bottom:24px\">\n            <div>\n              <h1 style=\"font-size:34px;font-weight:600;letter-spacing:-0.02em;margin:0 0 6px\">Data lake<\u002Fh1>\n              <p style=\"font-size:16px;color:#9fb3a9;margin:0\">{{ lakeSub }}<\u002Fp>\n            <\u002Fdiv>\n            <sc-if value=\"{{ showIngestBtn }}\" hint-placeholder-val=\"{{ false }}\"><button onclick=\"{{ ingestBtn.onClick }}\" style=\"{{ ingestBtn.style }}\">{{ ingestBtn.label }}<\u002Fbutton><\u002Fsc-if>\n          <\u002Fdiv>\n\n          <div ondragover=\"{{ onDragOver }}\" ondragleave=\"{{ onDragLeave }}\" ondrop=\"{{ onDrop }}\" style=\"{{ dropStyle }}\">\n            <input type=\"file\" id=\"tessera-file-input\" multiple=\"\" ref=\"{{ setFileInput }}\" style=\"display:none\" onchange=\"{{ onFiles }}\">\n            <div style=\"font-family:'JetBrains Mono',monospace;font-size:30px;color:#2fd08a;margin-bottom:14px\">↧<\u002Fdiv>\n            <div style=\"font-size:19px;font-weight:600;margin-bottom:6px\">Drop documents to ingest<\u002Fdiv>\n            <div style=\"font-size:14px;color:#9fb3a9;max-width:520px;text-align:center;line-height:1.45\">PDF, TXT, CSV, EML, JSON, HTML — or anything. Each file is read, classified, and its fields extracted on arrival.<\u002Fdiv>\n            <div style=\"display:flex;gap:12px;margin-top:20px\">\n              <button onclick=\"{{ onBrowse }}\" style=\"background:#2fd08a;color:#06140e;border:none;font-family:'JetBrains Mono',monospace;font-size:13px;font-weight:500;letter-spacing:0.04em;padding:11px 20px;border-radius:8px;cursor:pointer\">BROWSE FILES<\u002Fbutton>\n              <button onclick=\"{{ onLoadSample }}\" style=\"background:transparent;color:#cdddd4;border:1px solid rgba(255,255,255,0.16);font-family:'JetBrains Mono',monospace;font-size:13px;letter-spacing:0.04em;padding:11px 20px;border-radius:8px;cursor:pointer\">LOAD SAMPLE SET<\u002Fbutton>\n            <\u002Fdiv>\n          <\u002Fdiv>\n\n          <sc-if value=\"{{ hasDocs }}\" hint-placeholder-val=\"{{ false }}\">\n            <div>\n              <div style=\"display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin:24px 0\">\n                <sc-for list=\"{{ lakeStats }}\" as=\"s\" hint-placeholder-count=\"4\">\n                  <div style=\"background:#122019;border:1px solid rgba(255,255,255,0.06);border-radius:12px;padding:20px 22px\">\n                    <div style=\"font-family:'JetBrains Mono',monospace;font-size:30px;font-weight:500;letter-spacing:-0.01em;color:{{ s.color }}\">{{ s.value }}<\u002Fdiv>\n                    <div style=\"font-size:14px;color:#9fb3a9;margin-top:6px\">{{ s.label }}<\u002Fdiv>\n                  <\u002Fdiv>\n                <\u002Fsc-for>\n              <\u002Fdiv>\n\n              <sc-if value=\"{{ showChips }}\" hint-placeholder-val=\"{{ false }}\">\n                <div style=\"display:flex;flex-wrap:wrap;gap:9px;margin-bottom:22px\">\n                  <sc-for list=\"{{ chips }}\" as=\"c\" hint-placeholder-count=\"5\">\n                    <button onclick=\"{{ c.onClick }}\" style=\"{{ c.style }}\">{{ c.label }}<\u002Fbutton>\n                  <\u002Fsc-for>\n                <\u002Fdiv>\n              <\u002Fsc-if>\n\n              <div style=\"display:grid;grid-template-columns:repeat(auto-fill,minmax(224px,1fr));gap:14px\">\n                <sc-for list=\"{{ docs }}\" as=\"d\" hint-placeholder-count=\"6\">\n                  <div style=\"{{ d.tileStyle }}\">\n                    <div style=\"font-family:'JetBrains Mono',monospace;font-size:13px;color:#eaf2ee;white-space:nowrap;overflow:hidden;text-overflow:ellipsis\">{{ d.name }}<\u002Fdiv>\n                    <div style=\"font-family:'JetBrains Mono',monospace;font-size:11px;color:#6f8a7e\">{{ d.source }}<\u002Fdiv>\n                    <div style=\"display:flex;align-items:center;gap:8px;margin-top:2px;min-height:22px\">\n                      <sc-if value=\"{{ d.isQueued }}\" hint-placeholder-val=\"{{ true }}\"><span style=\"font-family:'JetBrains Mono',monospace;font-size:11px;color:#6f8a7e\">queued<\u002Fspan><\u002Fsc-if>\n                      <sc-if value=\"{{ d.isClassifying }}\" hint-placeholder-val=\"{{ false }}\"><span style=\"width:11px;height:11px;border:2px solid rgba(47,208,138,0.3);border-top-color:#2fd08a;border-radius:50%;animation:ts-spin 0.7s linear infinite\"><\u002Fspan><span style=\"font-family:'JetBrains Mono',monospace;font-size:11px;color:#2fd08a\">reading…<\u002Fspan><\u002Fsc-if>\n                      <sc-if value=\"{{ d.isDone }}\" hint-placeholder-val=\"{{ false }}\"><span style=\"{{ d.pillStyle }}\">{{ d.pillLabel }}<\u002Fspan><span style=\"font-family:'JetBrains Mono',monospace;font-size:11px;color:#6f8a7e\">{{ d.metaLabel }}<\u002Fspan><\u002Fsc-if>\n                    <\u002Fdiv>\n                    <sc-if value=\"{{ d.showExtract }}\" hint-placeholder-val=\"{{ false }}\"><div style=\"font-family:'JetBrains Mono',monospace;font-size:11px;color:#9fb3a9;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;border-top:1px solid rgba(255,255,255,0.06);padding-top:7px;margin-top:1px\">{{ d.extractLine }}<\u002Fdiv><\u002Fsc-if>\n                  <\u002Fdiv>\n                <\u002Fsc-for>\n              <\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fsc-if>\n        <\u002Fdiv>\n      <\u002Fsc-if>\n\n      <!-- ===================== RECONCILIATION ===================== -->\n      <sc-if value=\"{{ isRecon }}\" hint-placeholder-val=\"{{ false }}\">\n        <sc-if value=\"{{ reconReady }}\" hint-placeholder-val=\"{{ true }}\">\n          <div>\n            <div style=\"display:flex;align-items: -val=\"{{ false }}\">\n                    <div style=\"padding:20px 22px;border-top:1px solid rgba(245,185,66,0.2);background:rgba(245,185,66,0.04);animation:ts-rise 0.2s ease\">\n                      <div style=\"display:flex;gap:30px;flex-wrap:wrap\">\n                        <div style=\"flex:1;min-width:320px\">\n                          <div style=\"font-family:'JetBrains Mono',monospace;font-size:11px;letter-spacing:0.12em;color:#f5b942;margin-bottom:8px\">WHAT WE FOUND<\u002Fdiv>\n                          <div style=\"font-size:16px;color:#eaf2ee;line-height:1.5;margin-bottom:16px\">{{ t.detail.body }}<\u002Fdiv>\n                          <div style=\"font-family:'JetBrains Mono',monospace;font-size:11px;letter-spacing:0.12em;color:#2fd08a;margin-bottom:8px\">RECOMMENDED ACTION<\u002Fdiv>\n                          <div style=\"font-size:16px;color:#cdddd4;line-height:1.5\">{{ t.detail.action }}<\u002Fdiv>\n                        <\u002Fdiv>\n                        <div style=\"width:260px;flex-shrink:0\">\n                          <div style=\"background:#16291f;border:1px solid rgba(242,104,95,0.3);border-radius:10px;padding:16px 18px;margin-bottom:14px\"><div style=\"font-size:13px;color:#9fb3a9\">Value at risk<\u002Fdiv><div style=\"font-family:'JetBrains Mono',monospace;font-size:26px;font-weight:500;color:#f2685f;margin-top:4px\">{{ t.detail.impact }}<\u002Fdiv><\u002Fdiv>\n                          <div style=\"font-family:'JetBrains Mono',monospace;font-size:11px;letter-spacing:0.1em;color:#6f8a7e;margin-bottom:8px\">EVIDENCE<\u002Fdiv>\n                          <sc-for list=\"{{ t.detail.sources }}\" as=\"src\" hint-placeholder-count=\"2\">\n                            <div style=\"font-family:'JetBrains Mono',monospace;font-size:12px;color:#9fb3a9;padding:5px 0;display:flex;align-items:center;gap:8px\"><span style=\"color:#2fd08a\">□<\u002Fspan>{{ src }}<\u002Fdiv>\n                          <\u002Fsc-for>\n                        <\u002Fdi alue at risk — everything reconciled cleanly.<\u002Fdiv><\u002Fsc-if>\n              <\u002Fdiv>\n              <div style=\"background:#122019;border:1px solid rgba(255,255,255,0.06);border-radius:14px;padding:24px 26px\">\n                <div style=\"font-size:18px;font-weight:600;margin-bottom:22px\">Document mix<\u002Fdiv>\n                <div style=\"display:flex;flex-direction:column;gap:16px\">\n                  <sc-for list=\"{{ mixBars }}\" as=\"m\" hint-placeholder-count=\"5\">\n                    <div style=\"display:flex;align-items:center;gap:14px;font-family:'JetBrains Mono',monospace;font-size:13px\">\n                      <span style=\"width:130px;color:#cdddd4;flex-shrink:0\">{{ m.label }}<\u002Fspan>\n                      <span style=\"height:16px;border-radius:4px;background:{{ m.color }};width:{{ m.width }}\"><\u002Fspan>\n                      <span style=\"color:#9fb3a9\">{{ m.val }}<\u002Fspan>\n                    <\u002Fdiv>\n                  <\u002Fsc-for>\n                <\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fdiv>\n\n            <div style=\"background:#122019;border:1px solid rgba(255,255,255,0.06);border-radius:14px;padding:24px 26px\">\n              <div style=\"display:flex;align-items:center;justify-content:space-between;margin-bottom:20px\">\n                <div style=\"font-size:18px;font-weight:600\">Action queue<\u002Fdiv>\n                <div style=\"font-family:'JetBrains Mono',monospace;font-size:12px;color:#6f8a7e\">prioritised by value at risk<\u002Fdiv>\n              <\u002Fdiv>\n              <sc-if value=\"{{ hasActions }}\" hint-placeholder-val=\"{{ true }}\">\n                <div style=\"display:flex;flex-direction:column\">\n                  <sc-for list=\"{{ actions }}\" as=\"a\" hint-placeholder-count=\"3\">\n                    <div style=\"display:flex;align-items:center;gap:20px;padding:15px 0;border-top:1px solid rgba(255,255,255,0.06)\">\n                      <span style=\"font-family:'JetBrains Mono',monospace;font-size:16px;font-weight:500;color:#f2685f;width:84px;flex-shrink:0\">{{ a.impact }}<\u002Fspan>\n                      <span style=\"{{ a.tagStyle }}\">{{ a.tag }}<\u002Fspan>\n                      <span style=\"font-size:15px;color:#eaf2ee;flex:1;min-width:0\">{{ a.text }}<\u002Fspan>\n                      <span style=\"font-size:14px;color:#9fb3a9;flex-shrink:0\">{{ a.vendor }}<\u002Fspan>\n                    <\u002Fdiv>\n                  <\u002Fsc-for>\n                <\u002Fdiv>\n              <\u002Fsc-if>\n              <sc-if value=\"{{ noActions }}\" hint-placeholder-val=\"{{ false }}\"><div style=\"font-size:15px;color:#9fb3a9;padding:6px 0\">No open actions — all documents cleared.<\u002Fdiv><\u002Fsc-if>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fsc-if>\n        <sc-if value=\"{{ insightsEmpty }}\" hint-placeholder-val=\"{{ false }}\">\n          <div style=\"display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:120px 20px\">\n            <div style=\"width:52px;height:52px;border-radius:14px;background:#122019;border:1px solid rgba(255,255,255,0.08);display:flex;align-items:center;justify-content:center;font-size:24px;color:#6f8a7e;margin-bottom:22px\">▲<\u002Fdiv>\n            <h2 style=\"font-size:26px;font-weight:600;margin:0 0 10px\">Run reconciliation to unlock insights<\u002Fh2>\n            <p style=\"font-size:16px;color:#9fb3a9;margin:0 0 26px;max-width:460px\">Insights are generated from matched documents and surfaced exceptions. Complete the three-way match first.<\u002Fp>\n            <button onclick=\"{{ onGoRecon }}\" style=\"background:#2fd08a;color:#06140e;border:none;font-family:'JetBrains Mono',monospace;font-size:14px;font-weight:500;letter-spacing:0.04em;padding:13px 22px;border-radius:9px;cursor:pointer\">GO TO RECONCILIATION →<\u002Fbutton>\n          <\u002Fdiv>\n        <\u002Fsc-if>\n      <\u002Fsc-if>\n\n    <\u002Fdiv>\n  <\u002Fmain>\n<\u002Fdiv>\n\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\">\nclass Component extends DCLogic {\n  state = { view:'lake', docs:[], ingestRunning:false, reconcileRunning:false, reconcileIdx:0, reconcileDone:false, filter:'all', expanded:null, dragOver:false, selected:null };\n\n  constructor(props) {\n    super(props);\n    this._files = new Map();\n    this._nextId = 1;\n    this.SAMPLE = this.buildSample();\n  }\n\n  componentDidMount() {\n    if (window.pdfjsLib) {\n      try { window.pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js'; } catch(e){}\n    }\n  }\n  componentWillUnmount() { clearInterval(this._rt); }\n\n  // ---------- sample documents (baked fields, run through the same UI) ----------\n  buildSample() {\n    const T = [\n      { ref:'4471', vendor:'Rhein Components GmbH', country:'Germany', cur:'EUR', po:84200, qty:4000, inv:84200, invno:'77310', grn:'full', result:'matched' },\n      { ref:'4472', vendor:'Aurora Logistics', country:'Brazil', cur:'BRL', po:312000, qty:600, inv:343200, invno:'5521-BR', grn:'full', result:'price' },\n      { ref:'4473', vendor:'Bharat Steelworks', country:'India', cur:'USD', po:128400, qty:4000, recv:3600, inv:128400, invno:'90244', grn:'short', result:'short' },\n      { ref:'4474', vendor:'Pacific Freight Co', country:'Singapore', cur:'SGD', po:56800, qty:120, inv:56800, invno:'88231', grn:'full', dup:true, result:'duplicate' },\n      { ref:'4475', vendor:'Continental Tooling', country:'United States', cur:'USD', po:73500, qty:300, inv:73500, invno:'10567', grn:'missing', result:'missing_grn' },\n      { ref:'4476', vendor:'Lyon Métaux SA', country:'France', cur:'EUR', po:null, qty:null, inv:45900, invno:'FR-2208', grn:'none', result:'missing_po' },\n      { ref:'4477', vendor:'Rhein Components GmbH', country:'Germany', cur:'EUR', po:19750, qty:500, inv:19750, invno:'77410', grn:'full', result:'matched' },\n      {  mk(j[0], j[1], 'junk', 0.97, { summary:'Not a procurement document' }));\n    return docs;\n  }\n\n  // ---------- file intake ----------\n  setFileInput(el) { this._fileInput = el; }\n  onBrowse() { (this._fileInput || document.getElementById('tessera-file-input'))?.click(); }\n  onFiles(e) { this.addFiles(e.target.files); e.target.value = ''; }\n  onDragOver(e) { e.preventDefault(); if (!this.state.dragOver) this.setState({ dragOver:true }); }\n  onDragLeave(e) { e.preventDefault(); this.setState({ dragOver:false }); }\n  onDrop(e) { e.preventDefault(); this.setState({ dragOver:false }); this.addFiles(e.dataTransfer.files); }\n\n  addFiles(fileList) {\n    const files = Array.from(fileList || []);\n    if (!files.length) return;\n    const add = files.map(f => {\n      const id = this._nextId++;\n      this._files.set(id, f);\n      const ext = (f.name.split('.').pop() || 'file').toLowerCase();\n      return { id, name:f.name, source:`${ext} · ${this.fsize(f.size)}`, synthetic:false, status:'queued', type:null, confidence:0, fields:{}, isJunk:false, needsReview:false };\n    });\n    this.setState(s => ({ docs:[...s.docs, ...add], reconcileDone:false, reconcileIdx:0, expanded:null }));\n  }\n\n  onLoadSample() {\n    const add = this.SAMPLE.map(d => ({ id:this._nextId++, name:d.name, source:d.source, synthetic:true, sampleType:d.type, sampleConf:d.conf, sampleFields:d.fields, status:'queued', type:null, confidence:0, fields:{}, isJunk:false, needsReview:false }));\n    this.setState(s => ({ docs:[...s.docs, ...add], reconcileDone:false, reconcileIdx:0, expanded:null }));\n  }\n\n  fsize(b) { if (!b && b !== 0) return ''; if (b < 1024) return b + ' B'; if (b < 1048576) return (b/1024).toFixed(0) + ' KB'; return (b/1048576).toFixed(1) + ' MB'; }\n  delay(ms) { return new Promise(r => setTimeout(r, ms)); }\n  updateDoc(id, patch) { this.setState(s => ({ docs: s.docs.map(d => d.id === id ? { ...d, ...patch } : d) })); }\n  setSelected(id) { this.setState({ selected: id }); }\n\n  explain(type, f, name) {\n    f = f || {};\n    const tn = { po:'a purchase order', invoice:'an invoice', grn:'a goods-received note', customs:'a customs declaration', junk:'not a procurement document' }[type] || 'a document';\n    const kw = { po:'purchase-order language', invoice:'invoice / amount-due language', grn:'goods-received / delivery-note language', customs:'customs-declaration language', junk:'email / notice language' }[type];\n    const signals = [];\n    if (kw) signals.push('Document language indicates ' + kw);\n    if (f.docId) signals.push('Document ID detected: ' + f.docId);\n    if (f.poRef) signals.push('References purchase order ' + f.poRef);\n    if (f.vendor) signals.push('Vendor named: ' + f.vendor);\n    if (f.total != null) signals.push('Monetary total present: ' + this.money(f.currency, f.total));\n    if (f.qty != null) signals.push('Quantity present: ' + Number(f.qty).toLocaleString() + ' units');\n    if (/\\.(png|jpe?g|gif|webp|bmp|tiff?|heic|svg)$/i.test(name || '')) signals.push('No extractable text — inferred from filename');\n    if (!signals.length) signals.push('Filename and content cues: ' + (name || 'document'));\n    const reasoning = 'Classified as ' + tn + ' from its layout and key fields' + (f.poRef ? ', and linked to ' + f.poRef + ' for reconciliation' : '') + '.';\n    return { reasoning, signals };\n  }\n\n  // ---------- ingestion ----------\n  async runIngest() {\n    if (this._running) return;\n    this._running = true; this.setState({ ingestRunning:true });\n    const queue = this.state.docs.filter(d => d.status === 'queued');\n    for (const doc of queue) {\n      this.updateDoc(doc.id, { status:'classifying' });\n      let res, excerpt = '';\n      try {\n        if (doc.synthetic) { await this.delay(150); res = { type:doc.sampleType, confidence:doc.sampleConf, fields:doc.sampleFields }; }\n        else { const text = await this.extractText(doc.id); excerpt = (text || '').replace(/\\s+/g,' ').trim().slice(0, 700); res = await this.classify(doc.name, text); }\n      } catch (e) { res = { type:'junk', confidence:0.4, fields:{ summary:'Could not read file' } }; }\n      const isJunk = res.type === 'junk';\n      const needsReview = !isJunk && (res.confidence || 0) < 0.85;\n      let reasoning = res.reasoning, signals = res.signals;\n      if (!reasoning || !signals || !signals.length) { const ex = this.explain(res.type, res.fields || {}, doc.name); reasoning = reasoning || ex.reasoning; signals = (signals && signals.length) ? signals : ex.signals; }\n      this.updateDoc(doc.id, { status:'done', type:res.type, confidence:res.confidence, fields:res.fields || {}, isJunk, needsReview, reasoning, signals, excerpt });\n    }\n    this._running = false; this.setState({ ingestRunning:false });\n  }\n\n  async extractText(id) {\n    const file = this._files.get(id);\n    if (!file) return '';\n    const name = (file.name || '').toLowerCase();\n    if (/\\.(txt|csv|tsv|json|eml|html?|md|xml|log|rtf|yaml|yml|ini)$/.test(name)) {\n      try { return (await file.text()).slice(0, 8000); } catch(e) { return ''; }\n    }\n    if (/\\.pdf$/.test(name) && window.pdfjsLib) {\n      try {\n        const buf = await file.arrayBuffer();\n        const pdf = await window.pdfjsLib.getDocument({ data:buf }).promise;\n        const pages = Math.min(pdf.numPages, 6); let out = '';\n        for (let i = 1; i <= pages; i++) { const pg = await pdf.getPage(i); const tc = await pg.getTextContent(); out += tc.items.map(it => it.str).join(' ') + '\\n'; }\n        return out.slice(0, 8000);\n      } catch(e) { return ''; }\n    }\n    if (/\\.(png|jpe?g|gif|webp|bmp|tiff?|heic|svg)$/.test(name)) return '';\n    try { const t = await file.text(); const printable = t.replace(/[^\\x20-\\x7E\\s]/g,'').length / Math.max(t.length,1); return printable > 0.7 ? t.slice(0,8000) : ''; } catch(e) { return ''; }\n  }\n\n  // ---- Local LLM config (Gemma via Ollama by default) ----\n  // Override without editing code:  localStorage.tessera_llm_model='gemma2'  /  localStorage.tessera_llm_endpoint='http://localhost:1234/v1/chat/completions'\n  llmEndpoint() { try { return (localStorage.getItem('tessera_llm_endpoint') || '').trim() || 'http://localhost:11434/api/generate'; } catch(e) { return 'http://localhost:11434/api/generate'; } }\n  llmModel() { try { return (localStorage.getItem('tessera_llm_model') || '').trim() || 'gemma3'; } catch(e) { return 'gemma3'; } }\n\n  async classify(name, text) {\n    try { return await this.modelClassify(name, text); }\n    catch(e) { console.warn('[Tessera] local model unreachable — using keyword fallback. ' + (e && e.message ? e.message : e)); }\n    return this.heuristicClassify(name, text);\n  }\n\n  async modelClassify(name, text) {\n    const body = text && text.trim() ? text.slice(0, 6000) : '(no extractable text — likely a scanned image or binary file; infer the type from the filename only and set a low confidence)';\n    const prompt = 'You are a procurement document-intelligence engine for an accounts-payable team. Classify ONE document and extract its key fields.\\n' +\n      'Respond with ONLY a single minified JSON object — no prose, no markdown fences. Schema:\\n' +\n      '{\"type\":\"purchase_order|invoice|goods_receipt|customs|junk\",\"confidence\":0-1,\"vendor\":string|null,\"country\":string|null,\"currency\":\"ISO4217 code\"|null,\"doc_id\":string|null,\"po_reference\":string|null,\"total_amount\":number|null,\"quantity\":number|null,\"summary\":\"max 12 words\",\"reasoning\":\"one sentence on why you chose this type\",\"signals\":[\"a concrete phrase or cue you found\",\"another cue\"]}\\n' +\n      'Rules: \"junk\" = anything that is NOT a procurement document (personal/marketing email, spam, out-of-office, newsletter, photo, notice). \"goods_receipt\" = delivery note / GRN / packing list. po_reference is the purchase-order number the document relates to. total_amount is a plain number with no symbols or commas. signals must quote real evidence from the document text. Use null for any absent field.\\n\\n' +\n      'FILENAME: ' + name + '\\nDOCUMENT TEXT:\\n' + body;\n    const endpoint = this.llmEndpoint();\n    const isOpenAI = /\\/(chat\\/)?completions$/.test(endpoint) || /\\/v1\\b/.test(endpoint);\n    const payload = isOpenAI\n      ? { model: this.llmModel(), messages:[{ role:'user', content: prompt }], temperature:0.1, stream:false }\n      : { model: this.llmModel(), prompt: prompt, stream:false, format:'json', options:{ temperature:0.1 } };\n    const resp = await fetch(endpoint, { method:'POST', headers:{ 'Content-Type':'application/json' }, body: JSON.stringify(payload) });\n    if (!resp.ok) throw new Error('HTTP ' + resp.status + ' from ' + endpoint);\n    const data = await resp.json();\n    const raw = isOpenAI ? (data.choices && data.choices[0] && data.choices[0].message && data.choices[0].message.content) : data.response;\n    const j = this.parseJson(raw || '');\n    const map = { purchase_order:'po', invoice:'invoice', goods_receipt:'grn', customs:'customs', junk:'junk' };\n    const type = map[j.type] || 'junk';\n    return { type, confidence: typeof j.confidence === 'number' ? j.confidence : 0.8,\n      reasoning: j.reasoning || null, signals: Array.isArray(j.signals) ? j.signals.filter(Boolean).map(String) : null,\n      fields: { vendor:j.vendor||null, country:j.country||null, currency:j.currency||null, docId:j.doc_id||null, poRef:j.po_reference||null,\n        total: this.num(j.total_amount), qty: this.num(j.quantity), summary:j.summary||null } };\n  }\n\n  parseJson(raw) {\n    if (!raw) return { type:'junk', confidence:0.4 };\n    let s = String(raw).replace(/```json/gi,'').replace(/```/g,'').trim();\n    const a = s.indexOf('{'), b = s.lastIndexOf('}');\n    if (a >= 0 && b > a) s = s.slice(a, b+1);\n    try { return JSON.parse(s); } catch(e) { return { type:'junk', confidence:0.4 }; }\n  }\n  num(x) { if (typeof x === 'number') return x; if (x == null) return null; const n = parseFloat(String(x).replace(/[^0-9.\\-]/g,'')); return isNaN(n) ? null : n; }\n\n  heuristicClassify(name, text) {\n    const hay = ((name || '') + ' ' + (text || '')).toLowerCase();\n    const has = re => re.test(hay);\n    let type = 'junk', conf = 0.62;\n    if (has(/out of office|unsubscribe|newsletter|verify your|reset your password|meeting notes|holiday|\\bspam\\b|click here|^re:|\\bre:\\s/)) { type='junk'; conf=0.9; }\n    else if (has(/purchase order|p\\.?\\s?o\\.?\\s*(no|number|#|:)|order confirmation/)) { type='po'; conf=0.84; }\n    else if (has(/goods received|goods receipt|\\bgrn\\b|delivery note|packing list/)) { type='grn'; conf=0.84; }\n    else if (has(/customs|declaration|hs code|tariff|import duty|bill of lading/)) { type='customs'; conf=0.82; }\n    else if (has(/invoice|tax invoice|amount due|bill to|remittance|vat/)) { type='invoice'; conf=0.84; }\n    const fields = { vendor:null, country:null, currency:null, docId:null, poRef:null, total:null, qty:null, summary:null };\n    const txt = text || '';\n    const po = txt.match(/p\\.?\\s?o\\.?[\\s#:\\-]*([A-Z0-9][A-Z0-9\\-]{2,})/i) || txt.match(/purchase order[^A-Z0-9]{0,14}([A-Z0-9][A-Z0-9\\-]{2,})/i);\n    if (po) fields.poRef = ('PO-' + po[1].replace(/^po-?/i,'')).toUpperCase();\n    const inv = txt.match(/invoice[\\s#:\\-]*(?:no\\.?|number)?[\\s:#]*([A-Z0-9][A-Z0-9\\-]{2,})/i);\n    if (inv) fields.docId = inv[1].toUpperCase();\n    const sym = txt.match(/(€|£|R\\$|S\\$|\\$|USD|EUR|GBP|BRL|SGD)/);\n    if (sym) { const m = { '€':'EUR','£':'GBP','R$':'BRL','S$':'SGD','$':'USD' }; fields.currency = m[sym[1]] || sym[1].toUpperCase(); }\n    const amounts = [...txt.matchAll(/(?:total|amount due|grand total|balance)[^0-9]{0,12}([0-9][0-9.,]{2,})/gi)].map(m => this.num(m[1])).filter(Boolean);\n    if (amounts.length) fields.total = Math.max(...amounts);\n    const qm = txt.match(/([0-9,]{1,9})\\s*(units|pcs|pieces|qty|ea\\b)/i);\n    if (qm) fields.qty = this.num(qm[1]);\n    fields.summary = type === 'junk' ? 'Not a procurement document' : 'Classified by keyword fallback';\n    return { type, confidence: conf, fields };\n  }\n\n  // ---------- reconciliation ----------\n  buildGroups() {\n    const done = this.state.docs.filter(d => d.status === 'done' && !d.isJunk);\n    const norm = s => (s || '').toString().toUpperCase().replace(/[^A-Z0-9]/g,'');\n    const map = new Map(); let solo = 0;\n    done.forEach(d => {\n      let k = d.type === 'po' ? norm(d.fields.poRef || d.fields.docId) : norm(d.fields.poRef);\n      if (!k) k = '__solo_' + (solo++) + '_' + d.id;\n      if (!map.has(k)) map.set(k, []);\n      map.get(k).push(d);\n    });\n    return [...map.entries()].map(([k, ds]) => this.evalGroup(k, ds));\n  }\n\n  evalGroup(key, ds) {\n    const po = ds.find(d => d.type === 'po');\n    const grns = ds.filter(d => d.type === 'grn');\n    const invs = ds.filter(d => d.type === 'invoice');\n    const anchor = po || invs[0] || ds[0];\n    const f = anchor.fields || {};\n    const cur = f.currency || (po && po.fields.currency) || (invs[0] && invs[0].fields.currency) || 'USD';\n    const ref = (po && po.fields.poRef) || (invs[0] && invs[0].fields.poRef) || f.docId || '—';\n    const vendor = f.vendor || (po && po.fields.vendor) || (invs[0] && invs[0].fields.vendor) || 'Unknown vendor';\n    const country = f.country || (po && po.fields.country) || (invs[0] && invs[0].fields.country) || '—';\n    const poTotal = po ? po.fields.total : null;\n    const inv = invs[0];\n    const invTotal = inv ? inv.fields.total : null;\n\n    let status = 'matched', risk = 0;\n    if (invs.length > 1) { status = 'duplicate'; risk = invTotal || 0; }\n    else if (po && !inv) status = 'await_invoice';\n    else if (!po && inv) { status = 'missing_po'; risk = invTotal || 0; }\n    else if (po && inv) {\n      const poQty = po.fields.qty, recvQty = grns.length ? grns[0].fields.qty : null;\n      if (grns.length === 0) { status = 'missing_grn'; risk = invTotal || 0; }\n      else if (poQty && recvQty && recvQty < poQty) { status = 'short'; risk = (poTotal || invTotal || 0) * (1 - recvQty / poQty); }\n      else if (poTotal && invTotal && invTotal > poTotal * 1.02) { status = 'price'; risk = invTotal - poTotal; }\n      else status = 'matched';\n    } else if (!po && !inv) status = 'orphan';\n\n    const EX = { duplicate:1, missing_po:1, missing_grn:1, short:1, price:1 };\n    const isEx = !!EX[status];\n    const recvQty = grns.length ? grns[0].fields.qty : null;\n    const poQty = po ? po.fields.qty : null;\n    return { key, ref, vendor, country, cur, po, grns, invs, inv, poTotal, invTotal, poQty, recvQty, status, risk, isEx,\n      docNames: ds.map(d => d.name) };\n  }\n\n  runReconcile() {\n    if (this._recRunning) return;\n    const groups = this.buildGroups();\n    if (!groups.length) return;\n    this._recRunning = true;\n    this.setState({ reconcileRunning:true, reconcileIdx:0, reconcileDone:false });\n    this._rt = setInterval(() => {\n      this.setState(s => {\n        const n = s.reconcileIdx + 1;\n        if (n >= groups.length) { clearInterval(this._rt); this._recRunning = false; return { reconcileIdx:groups.length, reconcileRunning:false, reconcileDone:true }; }\n        return { reconcileIdx:n };\n      });\n    }, 300);\n  }\n\n  reset() {\n    clearInterval(this._rt); this._running = false; this._recRunning = false; this._files = new Map(); this._nextId = 1;\n    this.setState({ view:'lake', docs:[], ingestRunning:false, reconcileRunning:false, reconcileIdx:0, reconcileDone:false, filter:'all', expanded:null, dragOver:false });\n  }\n\n  setView(v) { this.setState({ view:v }); }\n  setFilter(f) { this.setState({ filter:f }); }\n\n  money(cur, n) { if (n == null) return '—'; const sym = { EUR:'€', BRL:'R$', SGD:'S$', USD:'$', GBP:'£', INR:'₹', CNY:'¥', JPY:'¥' }[cur] || (cur ? cur + ' ' : '$'); return sym + Math.round(n).toLocaleString('en-US'); }\n  k(n) { if (!n) return '$0'; if (n >= 1000) return '$' + (n/1000).toFixed(1) + 'K'; return '$' + Math.round(n); }\n\n  renderVals() {\n    const st = this.state;\n    const emerald = '#2fd08a', amber = '#f5b942', coral = '#f2685f', sub = '#9fb3a9', faint = '#6f8a7e';\n    const docsAll = st.docs;\n    const queued = docsAll.filter(d => d.status === 'queued').length;\n    const doneCount = docsAll.filter(d => d.status === 'done').length;\n    const ingestComplete = doneCount > 0 && queued === 0 && !st.ingestRunning;\n    const reconcileDone = st.reconcileDone;\n    const hasModel = true; const llmName = this.llmModel();\n\n    // NAV\n    const navDef = [ { key:'lake', label:'Data lake', done: ingestComplete }, { key:'recon', label:'Reconciliation', done: reconcileDone }, { key:'insights', label:'Insights', done: reconcileDone } ];\n    const nav = navDef.map(n => {\n      const active = st.view === n.key;\n      return { label:n.label, done:n.done, onClick:() => this.setView(n.key),\n        rowStyle:`display:flex;align-items:center;gap:11px;width:100%;text-align:left;padding:11px 13px;border-radius:9px;border:none;cursor:pointer;background:${active?'#16291f':'transparent'};transition:background .15s`,\n        dotStyle:`width:7px;height:7px;border-radius:50%;flex-shrink:0;background:${active?emerald:'#3a4a42'}`,\n        labelStyle:`font-size:15px;font-weight:${active?600:500};color:${active?'#eaf2ee':sub}` };\n    });\n\n    // DOCS display\n    const typeName = { po:'Purchase order', invoice:'Invoice', grn:'Goods receipt', customs:'Customs', junk:'Junk' };\n    const docViews = docsAll.map(d => {\n      const isDone = d.status === 'done';\n      const isClassifying = d.status === 'classifying';\n      const isQueued = d.status === 'queued';\n      const review = isDone && d.needsReview;\n      const quar = isDone && d.isJunk;\n      const pillBase = \"font-family:'JetBrains Mono',monospace;font-size:11px;letter-spacing:0.02em;padding:3px 8px;border-radius:5px;white-space:nowrap;\";\n      let pillStyle = '', pillLabel = '', metaLabel = '';\n      if (quar) { pillStyle = pillBase+'background:rgba(255,255,255,0.05);color:#6f8a7e'; pillLabel='Quarantined'; metaLabel='noise'; }\n      else if (review) { pillStyle = pillBase+'background:rgba(245,185,66,0.14);color:#f5b942'; pillLabel=typeName[d.type]||'Document'; metaLabel=Math.round((d.confidence||0)*100)+'% · review'; }\n      else if (isDone) { pillStyle = pillBase+'background:rgba(47,208,138,0.12);color:#2fd08a'; pillLabel=typeName[d.type]||'Document'; metaLabel=Math.round((d.confidence||0)*100)+'%'; }\n      let border = 'rgba(255,255,255,0.07)', op = '1';\n      if (isClassifying) border = 'rgba(47,208,138,0.5)';\n      else if (review) border = 'rgba(245,185,66,0.4)';\n      if (quar) op = '0.55';\n      const tileStyle = `background:#122019;border:1px solid ${border};border-radius:10px;padding:13px 14px;display:flex;flex-direction:column;gap:6px;min-width:0;opacity:${op};${isClassifying?'animation:ts-pulse 1s ease infinite;':''}`;\n      // extract line\n      let extractLine = '', showExtract = false;\n      if (isDone && !d.isJunk) {\n        const f = d.fields || {};\n        const bits = [];\n        if (f.vendor) bits.push(f.vendor);\n        if (f.total != null) bits.push(this.money(f.currency, f.total));\n        if (!bits.length && f.poRef) bits.push(f.poRef);\n        if (!bits.length && f.summary) bits.push(f.summary);\n        if (bits.length) { extractLine = bits.join(' · '); showExtract = true; }\n      } else if (isDone && d.isJunk && d.fields && d.fields.summary) { extractLine = d.fields.summary; showExtract = true; }\n      return { id:d.id, type:d.type, isJunk:d.isJunk, review, name:d.name, source:d.source, isDone, isClassifying, isQueued, pillStyle, pillLabel, metaLabel, tileStyle, extractLine, showExtract };\n    });\n\n    // filter\n    const f = st.filter;\n    const docs = docViews.filter(d => {\n      if (f === 'all') return true;\n      if (f === 'quarantined') return d.isJunk;\n      if (f === 'review') return d.review;\n      if (!d.isDone) return true;\n      return d.type === f;\n    });\n\n    // lake stats\n    const total = docsAll.length;\n    const routed = docsAll.filter(d => d.status === 'done' && !d.isJunk).length;\n    const quarN = docsAll.filter(d => d.status === 'done' && d.isJunk).length;\n    const reviewN = docsAll.filter(d => d.status === 'done' && d.needsReview).length;\n    const lakeStats = [\n      { value:String(total), label:'documents in lake', color:'#eaf2ee' },\n      { value: doneCount ? String(routed) : '—', label:'routed to processing', color: doneCount?emerald:sub },\n      { value: doneCount ? String(quarN) : '—', label:'quarantined as noise', color:sub },\n      { value: doneCount ? String(reviewN) : '—', label:'flagged for review', color: reviewN?amber:sub }\n    ];\n    const lakeSub = total === 0 ? 'Drop files or load the sample set to begin'\n      : ingestComplete ? `${total} documents classified${hasModel?' by the engine':''}`\n      : st.ingestRunning ? 'Reading and classifying documents…'\n      : `${total} documents staged — ${queued} queued for ingestion`;\n\n    // ingest button\n    const btnBase = \"font-family:'JetBrains Mono',monospace;font-size:13px;font-weight:500;letter-spacing:0.05em;padding:13px 22px;border-radius:9px;border:none;\";\n    let ingestBtn, showIngestBtn = total > 0;\n    if (st.ingestRunning) { const processed = docsAll.filter(d=>d.status==='done').length; ingestBtn = { label:`CLASSIFYING ${processed} / ${total}…`, onClick:()=>{}, style: btnBase+'background:#16291f;color:#2fd08a;cursor:default' }; }\n    else if (queued > 0) ingestBtn = { label:`▶  RUN INGESTION (${queued})`, onClick:() => this.runIngest(), style: btnBase+'background:#2fd08a;color:#06140e;cursor:pointer' };\n    else if (doneCount > 0) ingestBtn = { label:'✓  INGESTION COMPLETE', onClick:()=>{}, style: btnBase+'background:rgba(47,208,138,0.12);color:#2fd08a;cursor:default' };\n    else { showIngestBtn = false; ingestBtn = { label:'', onClick:()=>{}, style:'' }; }\n\n    // chips\n    const cnt = t => docsAll.filter(d => d.status === 'done' && d.type === t).length;\n    const chipDef = [ { key:'all', label:'All', n:total }, { key:'po', label:'Purchase orders', n:cnt('po') }, { key:'invoice', label:'Invoices', n:cnt('invoice') }, { key:'grn', label:'Goods receipts', n:cnt('grn') }, { key:'customs', label:'Customs', n:cnt('customs') }, { key:'review', label:'Needs review', n:reviewN }, { key:'quarantined', label:'Quarantined', n:quarN } ];\n    const chips = chipDef.filter(c => c.key==='all' || c.n>0).map(c => {\n      const on = st.filter === c.key;\n      return { label:`${c.label} · ${c.n}`, onClick:()=>this.setFilter(c.key), style:`font-family:'JetBrains Mono',monospace;font-size:12px;padding:8px 13px;border-radius:7px;cursor:pointer;border:1px solid ${on?'rgba(47,208,138,0.5)':'rgba(255,255,255,0.1)'};background:${on?'rgba(47,208,138,0.1)':'transparent'};color:${on?'#2fd08a':sub}` };\n    });\n\n    // dropzone style\n    const dropStyle = `display:flex;flex-direction:column;align-items:center;justify-content:center;padding:40px 24px;border-radius:16px;border:1.5px dashed ${st.dragOver?'rgba(47,208,138,0.8)':'rgba(255,255,255,0.16)'};background:${st.dragOver?'rgba(47,208,138,0.06)':'#0e1712'};transition:all .15s`;\n\n    // RECONCILIATION\n    const groups = doneCount > 0 ? this.buildGroups() : [];\n    const exLabel = { matched:'✓ Matched', price:'Price variance', short:'Short delivery', duplicate:'Duplicate invoice', missing_grn:'Missing GRN', missing_po:'No matching PO', await_invoice:'Awaiting invoice', orphan:'Awaiting counterpart' };\n    // sort: exceptions by risk desc, then others\n    const ordered = [...groups].sort((a,b) => (b.isEx?1:0)-(a.isEx?1:0) || (b.risk||0)-(a.risk||0));\n    const txns = ordered.map((g, i) => {\n      const resolved = reconcileDone || i < st.reconcileIdx;\n      const resolving = st.reconcileRunning && i === st.reconcileIdx;\n      const pillBase = \"font-family:'JetBrains Mono',monospace;font-size:12px;letter-spacing:0.03em;padding:5px 11px;border-radius:6px;white-space:nowrap;\";\n      let pillStyle, pillLabel;\n      if (!resolved) { pillStyle = pillBase+`background:rgba(255,255,255,0.05);color:${faint}`; pillLabel = resolving ? 'matching…' : 'pending'; }\n      else if (g.status === 'matched') { pillStyle = pillBase+'background:rgba(47,208,138,0.14);color:#2fd08a'; pillLabel = '✓ Matched'; }\n      else if (g.isEx) { pillStyle = pillBase+'background:rgba(245,185,66,0.16);color:#f5b942'; pillLabel = exLabel[g.status]; }\n      else { pillStyle = pillBase+`background:rgba(255,255,255,0.06);color:${sub}`; pillLabel = exLabel[g.status]; }\n\n      const norm = '#eaf2ee';\n      const poCol = { label:'Purchase order', main: g.po ? this.money(g.cur, g.poTotal) : 'No PO', sub: g.po ? (g.po.fields.poRef || g.ref) : 'not in this batch', flag: !g.po && resolved && g.status==='missing_po' };\n      let grnMain, grnSub, grnFlag = false;\n      if (g.grns.length === 0) { grnMain = 'Not received'; grnSub = 'no GRN on file'; grnFlag = (g.status==='missing_grn'); }\n      else if (g.poQty && g.recvQty && g.recvQty < g.poQty) { grnMain = `${g.recvQty.toLocaleString()} / ${g.poQty.toLocaleString()}`; grnSub = 'units · short delivery'; grnFlag = true; }\n      else { grnMain = 'Received'; grnSub = g.recvQty ? g.recvQty.toLocaleString()+' units' : 'confirmed'; }\n      const grnCol = { label:'Goods received', main:grnMain, sub:grnSub, flag: grnFlag && resolved };\n      let invSub = g.inv ? (g.inv.fields.docId || 'invoice') : 'no invoice yet', invFlag = false;\n      if (g.status === 'price') { invSub = 'over PO price'; invFlag = true; }\n      else if (g.status === 'duplicate') { invSub = (g.inv && g.inv.fields.docId ? g.inv.fields.docId : 'invoice') + ' · submitted 2×'; invFlag = true; }\n      const invCol = { label:'Invoice', main: g.inv ? this.money(g.cur, g.invTotal) : 'No invoice', sub: invSub, flag: invFlag && resolved };\n      const cols = [poCol, grnCol, invCol].map(c => ({ label:c.label, main:c.main, sub:c.sub, color: c.flag ? coral : norm, subColor: c.flag ? coral : faint }));\n\n      // detail\n      const detailBody = {\n        price: `The invoice from ${g.vendor} bills ${this.money(g.cur, g.invTotal)} against a purchase order of ${this.money(g.cur, g.poTotal)} — an overcharge of ${this.money(g.cur, (g.invTotal||0)-(g.poTotal||0))}. Goods were received, so this is a pricing discrepancy, not a delivery issue.`,\n        short: `Only ${(g.recvQty||0).toLocaleString()} of ${(g.poQty||0).toLocaleString()} ordered units were received from ${g.vendor}, but the invoice bills for the full order.`,\n        duplicate: `Invoice ${g.inv && g.inv.fields.docId ? g.inv.fields.docId : ''} from ${g.vendor} appears ${g.invs.length} times in this batch. Paying each copy would multiply a single charge.`,\n        missing_grn: `A purchase order and matching invoice exist for ${g.vendor}, but no goods receipt confirms delivery. Paying now risks releasing ${this.money(g.cur, g.invTotal)} for goods that may not have arrived.`,\n        missing_po: `An invoice for ${this.money(g.cur, g.invTotal)} from ${g.vendor} has no matching purchase order in this batch. It cannot be validated against an approved commitment.`\n      };\n      const detailAction = {\n        price: 'Hold the difference and dispute the overbilling against the agreed PO price before releasing payment.',\n        short: 'Withhold payment on the undelivered units, or request a corrected invoice matching the goods receipt.',\n        duplicate: 'Pay once and block the duplicate. Flag the vendor feed for repeated submissions.',\n        missing_grn: 'Hold payment until the warehouse confirms receipt, then release against the goods-received note.',\n        missing_po: 'Hold the invoice and locate or raise the matching purchase order before approving.'\n      };\n      const canExpand = resolved && g.isEx;\n      const open = canExpand && st.expanded === g.key;\n      let cardBorder = 'rgba(255,255,255,0.07)';\n      if (resolving) cardBorder = 'rgba(47,208,138,0.4)';\n      else if (resolved && g.isEx) cardBorder = 'rgba(245,185,66,0.28)';\n      else if (resolved && g.status === 'matched') cardBorder = 'rgba(47,208,138,0.18)';\n      return {\n        key:g.key, ref: g.ref, vendor:g.vendor, country:g.country, pillStyle, pillLabel,\n        cardStyle:`background:#122019;border:1px solid ${cardBorder};border-radius:13px;overflow:hidden;${resolving?'animation:ts-pulse 1s ease infinite;':''}`,\n        headStyle:`display:flex;align-items:center;justify-content:space-between;gap:16px;padding:17px 22px;cursor:${canExpand?'pointer':'default'}`,\n        onClick: canExpand ? () => this.setState(s => ({ expanded: s.expanded === g.key ? null : g.key })) : null,\n        canExpand, chevStyle:`font-size:22px;color:${faint};transition:transform .2s;display:inline-block;transform:rotate(${open?90:0}deg)`,\n        cols, showDetail: open,\n        detail: { body: detailBody[g.status] || '', action: detailAction[g.status] || '', impact: this.k(g.risk), sources: g.docNames }\n      };\n    });\n\n    const matchedN = groups.filter(g => g.status === 'matched').length;\n    const exGroups = groups.filter(g => g.isEx);\n    const exN = exGroups.length;\n    const riskTotal = groups.reduce((a,g) => a + (g.risk||0), 0);\n    const reconSummary = { matched: reconcileDone?String(matchedN):'—', exceptions: reconcileDone?String(exN):'—', risk: reconcileDone?this.k(riskTotal):'—' };\n    let reconBtn;\n    if (st.reconcileRunning) reconBtn = { label:`MATCHING ${st.reconcileIdx} / ${groups.length}…`, onClick:()=>{}, style: btnBase+'background:#16291f;color:#2fd08a;cursor:default' };\n    else if (reconcileDone) reconBtn = { label:'✓  RECONCILIATION COMPLETE', onClick:()=>this.runReconcile(), style: btnBase+'background:rgba(47,208,138,0.12);color:#2fd08a;cursor:pointer' };\n    else reconBtn = { label:'▶  RUN RECONCILIATION', onClick:() => this.runReconcile(), style: btnBase+'background:#2fd08a;color:#06140e;cursor:pointer' };\n\n    // INSIGHTS\n    const confDocs = docsAll.filter(d => d.status==='done' && !d.isJunk);\n    const avgConf = confDocs.length ? Math.round(confDocs.reduce((a,d)=>a+(d.confidence||0),0)/confDocs.length*100) : 0;\n    const kpis = [\n      { value:String(total), label:'documents ingested', color:'#eaf2ee' },\n      { value:String(routed), label:'routed to AP', color:'#eaf2ee' },\n      { value:String(quarN), label:'quarantined', color:sub },\n      { value:String(exN), label:'exceptions surfaced', color: exN?amber:sub },\n      { value:this.k(riskTotal), label:'value at risk', color: riskTotal?coral:sub },\n      { value:avgConf+'%', label:'avg confidence', color:emerald }\n    ];\n    const byType = {};\n    exGroups.forEach(g => { byType[g.status] = (byType[g.status]||0) + (g.risk||0); });\n    const riskArr = Object.entries(byType).map(([k,v]) => ({ status:k, val:v })).sort((a,b)=>b.val-a.val);\n    const maxRisk = Math.max(1, ...riskArr.map(r => r.val));\n    const riskBars = riskArr.map(r => ({ label: (exLabel[r.status]||r.status).replace('✓ ',''), disp:this.k(r.val), width:(r.val/maxRisk*100).toFixed(0)+'%' }));\n    const mixDef = [ { label:'Invoice', t:'invoice', color:'#2c6b52' }, { label:'Purchase order', t:'po', color:'#2c6b52' }, { label:'Goods receipt', t:'grn', color:'#2c6b52' }, { label:'Customs', t:'customs', color:'#2c6b52' }, { label:'Quarantined', t:'junk', color:'#3a4a42' } ];\n    const mixCounts = mixDef.map(m => ({ ...m, val: docsAll.filter(d=>d.status==='done' && d.type===m.t).length })).filter(m => m.val>0);\n    const maxMix = Math.max(1, ...mixCounts.map(m => m.val));\n    const mixBars = mixCounts.map(m => ({ label:m.label, val:String(m.val), color:m.color, width:(m.val/maxMix*100).toFixed(0)+'%' }));\n    const actTag = `font-family:'JetBrains Mono',monospace;font-size:11px;letter-spacing:0.03em;padding:4px 9px;border-radius:5px;white-space:nowrap;width:150px;text-align:center;flex-shrink:0;background:rgba(245,185,66,0.13);color:${amber}`;\n    const actionText = { missing_grn:'Hold payment — no goods receipt confirms delivery', duplicate:'Block duplicate invoice before it is paid twice', short:'Recover short-delivered units or adjust the invoice', price:'Dispute overbilling against agreed PO price', missing_po:'Hold — invoice has no matching purchase order' };\n    const actions = [...exGroups].sort((a,b)=>(b.risk||0)-(a.risk||0)).map(g => ({ impact:this.k(g.risk), tag:(exLabel[g.status]||'').replace('✓ ',''), tagStyle:actTag, text:actionText[g.status]||'Review exception', vendor:g.vendor }));\n\n    return {\n      crumb: st.view === 'lake' ? 'data-lake' : st.view === 'recon' ? 'reconciliation' : 'insights',\n      engineLabel: 'Local model · ' + llmName + ' (Ollama) · keyword fallback if offline',\n      onReset: () => this.reset(),\n      nav,\n      isLake: st.view === 'lake', isRecon: st.view === 'recon', isInsights: st.view === 'insights',\n      // lake\n      hasDocs: total > 0, lakeSub, lakeStats, showChips: doneCount > 0 && chips.length > 1, chips, docs, ingestBtn, showIngestBtn, dropStyle,\n      onBrowse: () => this.onBrowse(), onFiles: (e) => this.onFiles(e), onLoadSample: () => this.onLoadSample(),\n      setFileInput: (el) => this.setFileInput(el),\n      onDragOver: (e) => this.onDragOver(e), onDragLeave: (e) => this.onDragLeave(e), onDrop: (e) => this.onDrop(e),\n      // recon\n      reconReady: doneCount > 0, reconEmpty: doneCount === 0,\n      onGoIngest: () => this.setView('lake'), txns, reconSummary, reconBtn,\n      // insights\n      insightsReady: reconcileDone, insightsEmpty: !reconcileDone,\n      onGoRecon: () => this.setView('recon'),\n      kpis, riskBars, mixBars, actions,\n      hasRisk: riskBars.length > 0, noRisk: riskBars.length === 0,\n      hasActions: actions.length > 0, noActions: actions.length === 0\n    };\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
